services:
  # 1. AI Core Engine (FastAPI)
  - type: web
    name: gearsentinel-ai-service
    runtime: python
    plan: free
    buildCommand: "pip install -r ai_service/requirements.txt && cd ai_service && python train_model.py"
    startCommand: "gunicorn -w 1 -k uvicorn.workers.UvicornWorker --chdir ai_service main:app --timeout 120"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: "10000"

  # 2. Main API Backend (Node.js)
  - type: web
    name: gearsentinel-backend
    runtime: node
    plan: free
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false # Set in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set in Render Dashboard
      - key: AI_SERVICE_URL
        value: "https://gearsentinel-ai-service.onrender.com" # Update this to your AI service public URL
